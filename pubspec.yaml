name: nexchat
description: NexChat - Gen-Z Encrypted Messenger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────
  flutter_riverpod: any
  riverpod_annotation: any
  hooks_riverpod: any
  flutter_hooks: any

  # ── Navigation ────────────────────────────────────
  go_router: any

  # ── Supabase ──────────────────────────────────────
  supabase_flutter: any

  # ── Local Storage ─────────────────────────────────
  hive_flutter: any
  hive: any
  shared_preferences: any
  sqflite: any
  path_provider: any

  # ── Encryption ────────────────────────────────────
  encrypt: any
  pointycastle: any
  cryptography: any
  asn1lib: any
  local_auth: any

  # ── Media & Files ─────────────────────────────────
  image_picker: any
  file_picker: any
  cached_network_image: any
  video_player: any
  chewie: any
  just_audio: any
  photo_view: any
  image_cropper: any
  flutter_image_compress: any

  # ── Calls (WebRTC) ────────────────────────────────
  flutter_webrtc: any

  # ── Notifications ─────────────────────────────────
  flutter_local_notifications: any

  # ── UI & Animations ───────────────────────────────
  lottie: any
  flutter_animate: any
  shimmer: any
  glassmorphism: any
  animated_text_kit: any
  emoji_picker_flutter: any

  # ── Contacts & Phone ──────────────────────────────
  permission_handler: any

  # ── Utilities ─────────────────────────────────────
  uuid: any
  intl: any
  timeago: any
  url_launcher: any
  share_plus: any
  connectivity_plus: any
  package_info_plus: any
  device_info_plus: any
  path: any
  mime: any
  http: any
  dio: any
  rxdart: any
  collection: any
  freezed_annotation: any
  json_annotation: any
  equatable: any
  dartz: any

  # ── QR ─────────────────────────────────────────────
  qr_flutter: any

  # ── Backup ────────────────────────────────────────
  google_sign_in: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  riverpod_generator: any
  freezed: any
  json_serializable: any
  hive_generator: any
  mockito: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
